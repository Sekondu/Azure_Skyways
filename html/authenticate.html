<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/authenticate.css" />
    <title>Document</title>
  </head>
  <body>
    <div class="go_back">
      <p>&#8592;</p>
      <a href="../index.html">Go Back to Home Page</a>
    </div>
    <section class="left_section">
      <div class="left_section_container">
        <h2>Authenticate Your Account</h2>
        <form class="left_section_main">
          <div class="authenticate_btns">
            <p class="sign_up_btn">Sign Up</p>
            <hr />
            <p class="log_in_btn">Log In</p>
            <p class="selected"></p>
          </div>
          <div class="username">
            <label for="username">Username</label>
            <input type="text" placeholder="eg. John" />
          </div>
          <div class="password">
            <label for="password">Password</label>
            <input type="password" />
          </div>
          <button class="form_btn">Submit</button>
        </form>
        <div class="other_options">
          <hr />
          <p>or continue with</p>
          <hr />
        </div>
        <div class="google_apple_btns">
          <button>
            <img
              src="https://cdn.simpleicons.org/google/000000"
              style="width: 18px"
              alt=""
            />Google
          </button>
          <button>
            <img
              src="https://cdn.simpleicons.org/apple/000000"
              style="width: 21px"
              alt=""
            />Apple
          </button>
        </div>
      </div>
    </section>
    <hr class="middle_line" />
    <section class="right_section">
      <img src="../imgs/auth_pic.jpg" alt="" />
      <h1>"Sky is the Limits"</h1>
    </section>
    <script src="../scripts/section_animations.js"></script>
    <script src="../scripts/authenicate_script.js"></script>
  </body>
</html>
